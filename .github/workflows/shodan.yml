name: 自动更新纯净组播IP

on:
  schedule:
    # 国际标准时间 (UTC)，每4小时运行一次
    # 对应北京时间: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: "0 */4 * * *"
  workflow_dispatch: # 支持手动点击运行

jobs:
  update_proxy:
    runs-on: ubuntu-latest
    
    # 必须配置此项，否则 Actions 无法推送文件回仓库
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装必要依赖
        run: |
          pip install aiohttp requests

      - name: 执行 Shodan 抓取脚本
        # 确保你的 Python 文件名与此处一致
        run: python shodan_proxy.py

      - name: 提交并推送 ip.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有文件变动
          git add ip.txt
          if git diff --staged --quiet; then
            echo "本次扫描未发现 IP 变动，跳过推送。"
          else
            git commit -m "自动更新: 发现最新纯净组播IP $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
