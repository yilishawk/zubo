name: 自动更新纯净组播IP

on:
  schedule:
    # 国际标准时间 (UTC)，每4小时运行一次
    # 对应北京时间: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: "0 */4 * * *"
  workflow_dispatch: # 支持在 Actions 页面点击 "Run workflow" 手动运行

jobs:
  update_proxy:
    runs-on: ubuntu-latest
    
    # 必须显式开启写权限，否则无法推送更新后的 ip.txt
    permissions:
      contents: write

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装必要依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: 执行 Shodan 抓取脚本
        # 即使脚本报错，也让流程继续，以便执行后面的文件检查逻辑
        continue-on-error: true
        run: python shodan_proxy.py

      - name: 提交并推送结果 (Push changes)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 核心防御逻辑：如果脚本失败没生成文件，则创建一个空文件/占位，防止 git add 报错
          if [ ! -f ip.txt ]; then
            echo "# 初始文件创建时间: $(date)" > ip.txt
          fi
          
          # 2. 将文件加入暂存区
          git add ip.txt
          
          # 3. 只有当文件内容真正发生变化时才提交
          if git diff --staged --quiet; then
            echo "✅ 结果对比一致，无需更新推送。"
          else
            echo "🚀 发现 IP 列表变动，正在提交推送..."
            git commit -m "自动更新: 发现最新纯净组播IP $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
